# CymClaw — OpenClaw agent configuration
# Baked into the sandbox image; runtime values are patched by entrypoint.sh
# SPDX-License-Identifier: Apache-2.0

agents:
  defaults:
    model:
      primary: gemini-2.0-flash-exp

models:
  mode: merge
  providers:
    gemini:
      baseUrl: http://cymclaw-gateway:8899/v1
      api: openai-completions
      models:
        - id: gemini-2.0-flash-exp
          name: "Gemini 3 Flash Preview"
          contextWindow: 1048576
          maxTokens: 8192
          reasoning: false
          input: [text]
          cost:
            input: 0
            output: 0
            cacheRead: 0
            cacheWrite: 0
