# CymClaw — default preset
# Gemini AI + OpenClaw platform + npm
# GitHub is intentionally opt-in via presets/github.yaml.
# SPDX-License-Identifier: Apache-2.0

name: default
description: "Default: Gemini AI + OpenClaw + npm"

whitelist:
  # Google Generative Language API — primary inference endpoint
  - generativelanguage.googleapis.com

  # Anthropic — used by OpenClaw for telemetry and feature flags
  - api.anthropic.com
  - statsig.anthropic.com

  # OpenClaw platform — plugin registry, documentation, authentication
  - openclaw.ai
  - clawhub.com
  - docs.openclaw.ai

  # npm registry — package installs inside the sandbox
  - registry.npmjs.org
