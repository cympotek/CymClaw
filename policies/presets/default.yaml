# CymClaw — default preset
# Gemini AI + OpenClaw platform + GitHub + npm
# This preset is loaded automatically on first install.
# SPDX-License-Identifier: Apache-2.0

name: default
description: "Default: Gemini AI + OpenClaw + GitHub + npm"

whitelist:
  # Google Generative Language API — primary inference endpoint
  - generativelanguage.googleapis.com

  # Anthropic — used by OpenClaw for telemetry and feature flags
  - api.anthropic.com
  - statsig.anthropic.com

  # OpenClaw platform — plugin registry, documentation, authentication
  - openclaw.ai
  - clawhub.com
  - docs.openclaw.ai

  # GitHub — source code, git operations, raw file access
  - github.com
  - api.github.com
  - raw.githubusercontent.com
  - objects.githubusercontent.com

  # npm registry — package installs inside the sandbox
  - registry.npmjs.org
